# Render blueprint for the klaser-identity web service.
# Env vars marked `sync: false` must be filled in via the Render dashboard
# after this blueprint is applied — they never get committed to git.
services:
  - type: web
    name: klaser-identity
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: IDENTITY_URL
        value: https://auth.klaser.co.il
      - key: POST_AUTH_REDIRECT_URL
        value: https://takanon.klaser.co.il
      - key: ALLOWED_FRONTENDS
        value: https://takanon.klaser.co.il,https://meetings.klaser.co.il,https://www.klaser.co.il
      - key: SESSION_COOKIE_DOMAIN
        value: .klaser.co.il
      - key: SESSION_COOKIE_NAME
        value: klaser_session
      - key: MAIL_FROM_EMAIL
        value: noreply@klaser.co.il
      - key: MAIL_FROM_NAME
        value: Klaser
      # Secrets — filled in via the Render dashboard, never committed.
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SERVICE_TOKENS
        sync: false
